sonar.projectKey=mfaizadya_NeuronPath
sonar.organization=mfaizadya

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=NeuronPath
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude files from being inspected
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js,**/*.test.jsx,src/setupTests.js

# Tell SonarCloud where to find the coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude all files from coverage since project has no unit tests
sonar.coverage.exclusions=src/**

# Disable coverage quality gate (no test suite configured)
sonar.qualitygate.wait=false
